<div
  class="modal-overlay"
  *ngIf="isOpen"
>

  <div class="modal-container">

    <!-- HEADER -->

    <div class="modal-header">

      <h2>
        {{ title }}
      </h2>

      <button
        class="close-btn"
        (click)="closeModal()"
      >
        ✕
      </button>

    </div>

    <!-- BODY -->

    <div class="modal-body">

      <ng-content></ng-content>

    </div>

  </div>

</div>
