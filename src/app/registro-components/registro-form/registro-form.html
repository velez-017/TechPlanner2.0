<div class="registro-container">
  <div class="registro-card">
    <form>

      <div class="input-group">
        <span class="material-symbols-outlined">Nombre</span>
        <input type="text" placeholder="Nombre" />
      </div>

      <div class="input-group">
        <span class="material-symbols-outlined">Apellido</span>
        <input type="text" placeholder="Apellido" />
      </div>

      <div class="input-group">
        <span class="material-symbols-outlined">Correo electronico</span>
        <input type="email" placeholder="Correo electrónico" />
      </div>

      <div class="input-group">
        <span class="material-symbols-outlined">Contraseña</span>
        <input type="password" placeholder="Password" />
      </div>

      <button type="submit">Crear Usuario</button>

    </form>
  </div>
</div>
