<div class="login-container">
  <div class="login-card">
    <form>
      <div class="input-group">
        <span class="material-symbols-outlined">Correo electronico</span>
        <input type="email" placeholder="Correo electrónico" />
      </div>

      <div class="input-group">
        <span class="material-symbols-outlined">Contraseña</span>
        <input type="password" placeholder="Password" />
      </div>

      <button type="submit">Iniciar sesion</button>

      <p class="register-link">¿No tienes una cuenta? <a routerLink="/registro">Registrate</a></p>
    </form>
  </div>
</div>
