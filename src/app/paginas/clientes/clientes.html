<div class="clientes-layout">

  <!-- SIDEBAR -->
  <app-sidebar></app-sidebar>

  <!-- MAIN -->
  <main class="clientes-main">

    <!-- HEADER -->
    <div class="clientes-header">

      <div>

        <h1>
          Gestión de Clientes
        </h1>

        <p>
          Administra clientes, proyectos y estados comerciales
        </p>

      </div>

      <button
        class="add-btn"
        (click)="openModal()"
      >
        + Nuevo Cliente
      </button>

    </div>

    <!-- FILTERS -->
    <div class="filters">

      <input
        type="text"
        placeholder="Buscar cliente..."
      >

      <select>

        <option>
          Todos los estados
        </option>

        <option>
          Activo
        </option>

        <option>
          Pendiente
        </option>

        <option>
          Inactivo
        </option>

      </select>

    </div>

    <!-- TABLE -->
    <section class="table-card">

      <table>

        <thead>

        <tr>

          <th>
            Cliente
          </th>

          <th>
            Empresa
          </th>

          <th>
            Email
          </th>

          <th>
            Proyectos
          </th>

          <th>
            Estado
          </th>

          <th>
            Acciones
          </th>

        </tr>

        </thead>

        <tbody>

        <tr *ngFor="let cliente of clientes">

          <td>

            <div class="client-info">

              <div class="client-avatar">

                {{ cliente.nombre.charAt(0) }}

              </div>

              <span>

                {{ cliente.nombre }}

              </span>

            </div>

          </td>

          <td>

            {{ cliente.empresa }}

          </td>

          <td>

            {{ cliente.email }}

          </td>

          <td>

            {{ cliente.proyectos }}

          </td>

          <td>

            <span
              class="status active"
              *ngIf="cliente.estado === 'Activo'"
            >
              Activo
            </span>

            <span
              class="status pending"
              *ngIf="cliente.estado === 'Pendiente'"
            >
              Pendiente
            </span>

            <span
              class="status inactive"
              *ngIf="cliente.estado === 'Inactivo'"
            >
              Inactivo
            </span>

          </td>

          <td>

            <div class="actions">

              <button class="action-btn">
                ✏️
              </button>

              <button class="action-btn">
                🗑️
              </button>

            </div>

          </td>

        </tr>

        </tbody>

      </table>

    </section>

  </main>

</div>

<!-- MODAL -->

<app-modal
  [isOpen]="modalOpen"
  title="Nuevo Cliente"
  (close)="closeModal()"
>

  <div class="modal-form">

    <input
      type="text"
      placeholder="Nombre del cliente"
      [(ngModel)]="nuevoCliente.nombre"
    >

    <input
      type="email"
      placeholder="Correo electrónico"
      [(ngModel)]="nuevoCliente.email"
    >

    <input
      type="text"
      placeholder="Empresa"
      [(ngModel)]="nuevoCliente.empresa"
    >

    <input
      type="number"
      placeholder="Cantidad de proyectos"
      [(ngModel)]="nuevoCliente.proyectos"
    >

    <select [(ngModel)]="nuevoCliente.estado">

      <option value="Activo">
        Activo
      </option>

      <option value="Pendiente">
        Pendiente
      </option>

      <option value="Inactivo">
        Inactivo
      </option>

    </select>

    <button
      class="save-btn"
      (click)="guardarCliente()"
    >
      Guardar Cliente
    </button>

  </div>

</app-modal>
